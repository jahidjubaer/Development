<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="signup">
        <h1>Sign Up</h1>
        <p>It's free, only takes a minute.</p>
        
        <label for="name">Name:</label>
        <input type="text" id="name" name="user" placeholder="Your Name">
        
        <br><br>

        <label for="number">Number:</label>
        <select name="code">
            <option value="+888">+888</option>
            <option value="+000">+000</option>
            <option value="+930">+930</option>
        </select>
        <input type="number" id="number" name="user" placeholder="017794...">
        
        <br><br>

        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male"> Male
        <input type="radio" id="female" name="gender" value="female"> Female
        
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="jahidjubaer17@mail.com">
        
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
        
        <br><br>

        <label for="password_confirm">Confirm Password:</label>
        <input type="password" id="password_confirm" name="password_confirm">
        
        <br><br>

        <input type="submit" id="signup" value="Sign Up">
        <p>By clicking Sign Up, you agree to our </p>
        <a href="#" target="_blank">Terms and Conditions and Policy</a>
    </div>
</body>
</html>
